version: '3.8'

services:
  scraper:
    build: .
    container_name: indeed-scraper
    environment:
      - INDEED_BASE_URL=${INDEED_BASE_URL:-https://www.indeed.com}
      - SEARCH_QUERIES=${SEARCH_QUERIES:-python developer;data engineer;machine learning}
      - LOCATIONS=${LOCATIONS:-Remote;New York, NY;San Francisco, CA}
      - DB_TYPE=${DB_TYPE:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-indeed_scraper}
      - POSTGRES_USER=${POSTGRES_USER:-scraper}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PROXYMESH_USER=${PROXYMESH_USER}
      - PROXYMESH_PASS=${PROXYMESH_PASS}
      - SCRAPERAPI_KEY=${SCRAPERAPI_KEY}
      - GOOGLE_SEARCH_KEY=${GOOGLE_SEARCH_KEY}
      - SCHEDULE_INTERVAL_HOURS=${SCHEDULE_INTERVAL_HOURS:-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro

  postgres:
    image: postgres:15-alpine
    container_name: indeed-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-indeed_scraper}
      - POSTGRES_USER=${POSTGRES_USER:-scraper}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build: .
    container_name: indeed-api
    command: uvicorn indeed_scraper.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DB_TYPE=${DB_TYPE:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-indeed_scraper}
      - POSTGRES_USER=${POSTGRES_USER:-scraper}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PROXYMESH_USER=${PROXYMESH_USER}
      - PROXYMESH_PASS=${PROXYMESH_PASS}
      - SCRAPERAPI_KEY=${SCRAPERAPI_KEY}
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: indeed-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: indeed-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

networks:
  default:
    name: indeed-network